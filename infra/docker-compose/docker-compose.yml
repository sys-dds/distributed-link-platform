services:
  postgres:
    image: postgres:16.8
    container_name: link-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: link_platform
      POSTGRES_USER: link_platform
      POSTGRES_PASSWORD: link_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U link_platform -d link_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.9.0
    container_name: link-platform-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8080
      LINK_PLATFORM_RUNTIME_MODE: api
    ports:
      - "8080:8080"

  analytics-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: link-platform-analytics-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/link_platform
      DB_USERNAME: link_platform
      DB_PASSWORD: link_platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LINK_PLATFORM_PUBLIC_BASE_URL: http://localhost:8080
      LINK_PLATFORM_RUNTIME_MODE: worker

volumes:
  postgres-data:
