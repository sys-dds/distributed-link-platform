services:
  postgres:
    image: postgres:16.8
    container_name: link-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: link_platform
      POSTGRES_USER: link_platform
      POSTGRES_PASSWORD: link_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U link_platform -d link_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
