spring:
  application:
    name: link-platform-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/link_platform}
    username: ${DB_USERNAME:link_platform}
    password: ${DB_PASSWORD:link_platform}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:link-platform-analytics}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

link-platform:
  public-base-url: ${LINK_PLATFORM_PUBLIC_BASE_URL:http://localhost:8080}
  runtime:
    mode: ${LINK_PLATFORM_RUNTIME_MODE:all}
  analytics:
    click-topic: ${LINK_PLATFORM_ANALYTICS_CLICK_TOPIC:link-platform.analytics.redirect-clicks}
    outbox-relay-batch-size: ${LINK_PLATFORM_ANALYTICS_OUTBOX_BATCH_SIZE:50}
    outbox-relay-delay: ${LINK_PLATFORM_ANALYTICS_OUTBOX_DELAY:5000}
    outbox-relay-lease-duration: ${LINK_PLATFORM_ANALYTICS_OUTBOX_LEASE_DURATION:PT30S}
    outbox-relay-retry-base-delay: ${LINK_PLATFORM_ANALYTICS_OUTBOX_RETRY_BASE_DELAY:PT5S}
    outbox-relay-retry-max-delay: ${LINK_PLATFORM_ANALYTICS_OUTBOX_RETRY_MAX_DELAY:PT5M}
    outbox-relay-max-attempts: ${LINK_PLATFORM_ANALYTICS_OUTBOX_MAX_ATTEMPTS:5}
  lifecycle:
    topic: ${LINK_PLATFORM_LIFECYCLE_TOPIC:link-platform.lifecycle.link-events}
    outbox-relay-batch-size: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_BATCH_SIZE:50}
    outbox-relay-delay: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_DELAY:5000}
    outbox-relay-lease-duration: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_LEASE_DURATION:PT30S}
    outbox-relay-retry-base-delay: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_RETRY_BASE_DELAY:PT5S}
    outbox-relay-retry-max-delay: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_RETRY_MAX_DELAY:PT5M}
    outbox-relay-max-attempts: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_MAX_ATTEMPTS:5}
  projection-jobs:
    runner-delay: ${LINK_PLATFORM_PROJECTION_JOBS_RUNNER_DELAY:5000}
    lease-duration: ${LINK_PLATFORM_PROJECTION_JOBS_LEASE_DURATION:PT30S}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
