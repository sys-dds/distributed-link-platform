spring:
  application:
    name: link-platform-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/link_platform}
    username: ${DB_USERNAME:link_platform}
    password: ${DB_PASSWORD:link_platform}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:link-platform-analytics}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

link-platform:
  public-base-url: ${LINK_PLATFORM_PUBLIC_BASE_URL:http://localhost:8080}
  runtime:
    mode: ${LINK_PLATFORM_RUNTIME_MODE:all}
    redirect:
      region: ${LINK_PLATFORM_RUNTIME_REDIRECT_REGION:local}
      failover-region: ${LINK_PLATFORM_RUNTIME_REDIRECT_FAILOVER_REGION:}
      failover-base-url: ${LINK_PLATFORM_RUNTIME_REDIRECT_FAILOVER_BASE_URL:}
  query:
    datasource:
      url: ${QUERY_DB_URL:}
      username: ${QUERY_DB_USERNAME:}
      password: ${QUERY_DB_PASSWORD:}
      driver-class-name: ${QUERY_DB_DRIVER_CLASS_NAME:}
  analytics:
    click-topic: ${LINK_PLATFORM_ANALYTICS_CLICK_TOPIC:link-platform.analytics.redirect-clicks}
    outbox-relay-batch-size: ${LINK_PLATFORM_ANALYTICS_OUTBOX_BATCH_SIZE:50}
    outbox-relay-delay: ${LINK_PLATFORM_ANALYTICS_OUTBOX_DELAY:5000}
    outbox-relay-lease-duration: ${LINK_PLATFORM_ANALYTICS_OUTBOX_LEASE_DURATION:PT30S}
    outbox-relay-retry-base-delay: ${LINK_PLATFORM_ANALYTICS_OUTBOX_RETRY_BASE_DELAY:PT5S}
    outbox-relay-retry-max-delay: ${LINK_PLATFORM_ANALYTICS_OUTBOX_RETRY_MAX_DELAY:PT5M}
    outbox-relay-max-attempts: ${LINK_PLATFORM_ANALYTICS_OUTBOX_MAX_ATTEMPTS:5}
  lifecycle:
    topic: ${LINK_PLATFORM_LIFECYCLE_TOPIC:link-platform.lifecycle.link-events}
    outbox-relay-batch-size: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_BATCH_SIZE:50}
    outbox-relay-delay: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_DELAY:5000}
    outbox-relay-lease-duration: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_LEASE_DURATION:PT30S}
    outbox-relay-retry-base-delay: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_RETRY_BASE_DELAY:PT5S}
    outbox-relay-retry-max-delay: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_RETRY_MAX_DELAY:PT5M}
    outbox-relay-max-attempts: ${LINK_PLATFORM_LIFECYCLE_OUTBOX_MAX_ATTEMPTS:5}
  projection-jobs:
    runner-delay: ${LINK_PLATFORM_PROJECTION_JOBS_RUNNER_DELAY:5000}
    lease-duration: ${LINK_PLATFORM_PROJECTION_JOBS_LEASE_DURATION:PT30S}
    chunk-size: ${LINK_PLATFORM_PROJECTION_JOBS_CHUNK_SIZE:100}
  cache:
    enabled: ${LINK_PLATFORM_CACHE_ENABLED:true}
    redirect-ttl: ${LINK_PLATFORM_CACHE_REDIRECT_TTL:PT5M}
    owner-read-ttl: ${LINK_PLATFORM_CACHE_OWNER_READ_TTL:PT30S}
    analytics-ttl: ${LINK_PLATFORM_CACHE_ANALYTICS_TTL:PT15S}
  webhooks:
    enabled: ${LINK_PLATFORM_WEBHOOKS_ENABLED:true}
    allow-private-callback-hosts: ${LINK_PLATFORM_WEBHOOKS_ALLOW_PRIVATE_CALLBACK_HOSTS:false}
    allow-http-callbacks: ${LINK_PLATFORM_WEBHOOKS_ALLOW_HTTP_CALLBACKS:false}
    runner-delay-ms: ${LINK_PLATFORM_WEBHOOKS_RUNNER_DELAY_MS:5000}
    delivery-batch-size: ${LINK_PLATFORM_WEBHOOKS_DELIVERY_BATCH_SIZE:20}
    parked-threshold: ${LINK_PLATFORM_WEBHOOKS_PARKED_THRESHOLD:5}
    disable-threshold: ${LINK_PLATFORM_WEBHOOKS_DISABLE_THRESHOLD:10}
    connect-timeout-seconds: ${LINK_PLATFORM_WEBHOOKS_CONNECT_TIMEOUT_SECONDS:5}
    request-timeout-seconds: ${LINK_PLATFORM_WEBHOOKS_REQUEST_TIMEOUT_SECONDS:10}
  exports:
    enabled: ${LINK_PLATFORM_EXPORTS_ENABLED:true}
    runner-delay-ms: ${LINK_PLATFORM_EXPORTS_RUNNER_DELAY_MS:10000}
    max-payload-bytes: ${LINK_PLATFORM_EXPORTS_MAX_PAYLOAD_BYTES:5000000}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,queryDataSource,runtimeRole,redirectRuntime
