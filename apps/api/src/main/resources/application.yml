spring:
  application:
    name: link-platform-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/link_platform}
    username: ${DB_USERNAME:link_platform}
    password: ${DB_PASSWORD:link_platform}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
