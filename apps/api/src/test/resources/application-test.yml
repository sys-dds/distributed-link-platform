spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:tc:postgresql:16.8:///link_platform_test_${random.uuid}
    username: link_platform
    password: link_platform
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  kafka:
    listener:
      auto-startup: false

link-platform:
  analytics:
    outbox-relay-delay: 600000
  lifecycle:
    outbox-relay-delay: 600000
  projection-jobs:
    runner-delay: 600000
  webhooks:
    allow-private-callback-hosts: true
    allow-http-callbacks: true
    runner-delay-ms: 600000
  exports:
    runner-delay-ms: 600000
