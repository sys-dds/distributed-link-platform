spring:
  datasource:
    url: jdbc:h2:mem:linkplatform-${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

link-platform:
  public-base-url: http://localhost:8080
  query:
    datasource:
      url:
      username:
      password:
      driver-class-name:
  cache:
    enabled: true
